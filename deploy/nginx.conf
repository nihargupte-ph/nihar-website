upstream gunicorn_nihar {
    server unix:/run/gunicorn/nihar-website.sock fail_timeout=0;
}

# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name nihargupte.com www.nihargupte.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS server
server {
    listen 443 ssl http2;
    server_name nihargupte.com www.nihargupte.com;

    ssl_certificate /etc/letsencrypt/live/nihargupte.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nihargupte.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 10M;

    # Static files — served directly by Nginx, bypassing Django
    location /static/ {
        alias /home/deploy/nihar-website/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        sendfile on;
        tcp_nopush on;

        # Long cache for large data files that rarely change
        location ~* \.(h5|hdf5|svg)$ {
            expires 90d;
            add_header Cache-Control "public, immutable";
        }

        gzip on;
        gzip_types text/css application/javascript text/javascript image/svg+xml application/json;
        gzip_min_length 1000;
    }

    # Media files
    location /media/ {
        alias /home/deploy/nihar-website/media/;
        expires 30d;
    }

    # All other requests to Gunicorn
    location / {
        proxy_pass http://gunicorn_nihar;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 300s;
    }
}
